volumes:
  taski_pg_data:
  taski_static:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - taski_pg_data:/var/lib/postgresql/data
  backend:
    build: ./backend/
    env_file: .env
    # Тут подключаем volume к backend
    volumes:
      - taski_static:/backend_static
  frontend:
    env_file: .env
    build: ./frontend/
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - taski_static:/frontend_static/
  gateway:
    build: ./gateway/
    # А тут подключаем volume со статикой к gateway
    volumes:
      - taski_static:/staticfiles
    ports:
      - 8000:80